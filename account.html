<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SmartCert - Account</title>

        <!-- Google Font -->
        <link rel="preconnect" href="https://fonts.gstatic.com" />
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />

        <!-- Shared CSS -->
        <link rel="stylesheet" href="styles.css" />

        <!-- Tab Icon -->
        <link rel="icon" type="image/png" href="assets/img/tab_icon.png" />
    </head>
    <body>
        <div id="topRightContainer" class="pill-container">
            <button id="loginBtn" class="login-button hidden">Login/Signup</button>
            <img id="profilePic" class="profile-pic hidden" src="assets/img/pfp.avif" alt="Profile" />
            <img id="modeIcon" class="mode-icon" src="assets/img/dark.png" alt="Toggle Theme" />
        </div>
        <div class="standalone-page form-page">
            <h1>Your Account</h1>

            <!-- Account Card (Profile Pic + Basic Info) -->
            <div class="account-card">
                <img id="accountProfilePic" class="account-profile-pic" src="assets/img/pfp.avif" alt="Profile" />
                <div class="account-details">
                    <!-- We’ll fill these from Firestore & Auth in script.js -->
                    <p id="accountInfo" class="account-welcome-text"></p>
                    <p id="accountEmail" style="margin: 0.5rem 0;" class="muted-text"></p>
                    <p id="accountPhone" style="margin: 0.5rem 0;" class="muted-text"></p>
                </div>
            </div>

            <!-- Form to update user info (name, phone, photo) -->
            <form id="updateAccountForm" class="login-form">
                <label for="updateFirstName">First Name</label>
                <input type="text" id="updateFirstName" placeholder="John" />

                <label for="updateLastName">Last Name</label>
                <input type="text" id="updateLastName" placeholder="Doe" />

                <label for="updatePhone">Phone Number</label>
                <input type="tel" id="updatePhone" placeholder="+353 87 1234567" />

                <label for="newProfilePic">Change Profile Picture</label>
                <div class="file-upload-wrapper">
                    <button type="button" class="file-upload-btn" onclick="document.getElementById('newProfilePic').click()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        Choose Image
                    </button>
                    <span id="fileNameDisplay" class="file-name-display">No file chosen</span>
                    <input type="file" id="newProfilePic" accept="image/*" style="display:none" />
                </div>

            </form>

<!-- Update file name display when a file is picked -->
            <script>
                document.getElementById("newProfilePic").addEventListener("change", function() {
                    const name = this.files[0] ? this.files[0].name : "No file chosen";
                    document.getElementById("fileNameDisplay").textContent = name;
                });
            </script>

            <!-- Save Changes Button (submits the update form above) -->
            <button type="button" id="saveChangesBtn" style="display:block;width:100%;margin-top:1rem;padding:0.8rem;background-color:#3b82f6;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:1rem;">Save Changes</button>
            <script>
                document.getElementById("saveChangesBtn").addEventListener("click", function() {
                    document.getElementById("updateAccountForm").requestSubmit();
                });
            </script>

            <!-- Manage Subscription Link -->
            <a href="manageSubscription.html" style="display:block;text-align:center;margin-top:1rem;padding:0.6rem 1.2rem;background-color:#3b82f6;color:#fff;border-radius:8px;text-decoration:none;font-size:0.95rem;">Manage Subscription</a>

            <!-- Red Logout Button -->
            <button id="logoutBtn" class="logout-button">Log Out</button>

            <!-- Delete Account -->
            <button id="deleteAccountBtn" style="margin-top: 1rem; background-color: transparent; color: #e53e3e; border: 1px solid #e53e3e; padding: 0.6rem 1.2rem; border-radius: 8px; cursor: pointer; font-size: 0.9rem;">Delete My Account</button>

            <p style="margin-top: 1rem">
                <a href="chat.html" class="click-link">← Back to Home</a>
            </p>
        </div>

        <!-- Link to your main script (handles fetching/updating user data, logout, etc.) -->
        <script type="module" src="js/script.js"></script>
    </body>
</html>
